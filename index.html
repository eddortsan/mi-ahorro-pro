<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ahorro & Cetes App</title>
    <style>
        :root { --primary: #27ae60; --secondary: #2980b9; --danger: #e74c3c; --accent: #f39c12; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #2c3e50; -webkit-tap-highlight-color: transparent; }
        .card { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .header-app { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 20px; }
        .btn-edit-plan { position: absolute; right: 0; background: #eee; border: none; padding: 8px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: none; }

        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; grid-column: span 1; }
        .full-w { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 4px; font-size: 0.75rem; color: #7f8c8d; text-transform: uppercase; }
        input, select { padding: 12px; border: 1.5px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box; }
        
        .info-panel { grid-column: span 2; background: #eef7ff; padding: 12px; border-radius: 10px; font-size: 0.85rem; border-left: 4px solid var(--secondary); line-height: 1.4; }
        
        .btn-group { grid-column: span 2; display: flex; gap: 8px; }
        .btn { flex: 2; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; font-size: 1rem; }
        .btn-gen { background: var(--primary); }
        .btn-reset { background: #dfe6e9; color: #636e72; flex: 1; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { padding: 12px; border-radius: 15px; color: white; text-align: center; }
        .bg-save { background: var(--primary); }
        .bg-invest { background: var(--accent); }
        .stat-val { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 800; display: block; }
        .stat-lab { font-size: 0.65rem; text-transform: uppercase; opacity: 0.9; }

        .bar-container { background: #eee; border-radius: 20px; height: 14px; margin-bottom: 20px; overflow: hidden; }
        .bar-fill { background: var(--primary); width: 0%; height: 100%; transition: 0.8s ease-in-out; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
        .cell { padding: 15px 5px; background: #fff; border: 2px solid #eee; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .cell.checked { background: var(--primary); border-color: var(--primary); color: white; transform: scale(0.96); }
        .cell-num { font-size: 0.6rem; display: block; opacity: 0.7; margin-bottom: 2px; }
        .cell-amt { font-size: 0.95rem; font-weight: bold; }

        .bank-btn { display: block; text-align: center; background: var(--secondary); color: white; padding: 16px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 12px rgba(41,128,185,0.2); }
    </style>
</head>
<body>

<div class="card">
    <div class="header-app">
        <h2 style="margin:0; font-size: 1.3rem;">🚀 Mi Ahorro Inteligente</h2>
        <button id="btnEdit" class="btn-edit-plan" onclick="toggleSetup()" title="Configurar">⚙️</button>
    </div>
    
    <div id="setupForm" class="setup-grid">
        <div class="input-group">
            <label>Meta ($)</label>
            <input type="number" id="meta" value="50000" oninput="recalcular('monto')">
        </div>
        <div class="input-group">
            <label>Frecuencia</label>
            <select id="freq" onchange="recalcular('monto')">
                <option value="1">Diario</option>
                <option value="7">Semanal</option>
                <option value="15">Quincenal</option>
                <option value="30">Mensual</option>
            </select>
        </div>
        <div class="input-group">
            <label>Capacidad Máxima ($)</label>
            <input type="number" id="mMax" value="500" oninput="recalcular('monto')">
        </div>
        <div class="input-group">
            <label>Tasa CETES %</label>
            <input type="number" id="tasa" value="11.0" step="0.1" oninput="recalcular('monto')">
        </div>
        <div class="input-group full-w">
            <label>Fecha de Término Deseada</label>
            <input type="date" id="fTermino" onchange="recalcular('fecha')">
        </div>
        <div class="info-panel" id="proyTxt">Ingresa tus datos...</div>
        <div class="btn-group">
            <button class="btn btn-gen" onclick="generar()">¡Iniciar Mi Plan!</button>
            <button class="btn btn-reset" onclick="reset()">Reset</button>
        </div>
    </div>

    <div id="appArea" style="display:none;">
        <div class="stat-grid">
            <div class="stat-box bg-save">
                <span class="stat-lab">Total Ahorrado</span>
                <span class="stat-val" id="valAhorro">$0</span>
            </div>
            <div class="stat-box bg-invest">
                <span class="stat-lab">Valor en CETES</span>
                <span class="stat-val" id="valCetes">$0</span>
            </div>
        </div>
        <div class="bar-container"><div id="bar" class="bar-fill"></div></div>
        <div class="grid" id="grid"></div>
        <a href="https://www.cetesdirecto.com/" target="_blank" class="bank-btn">Transferir a CetesDirecto 🏦</a>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('saveApp_vFinal')) || null;

    function recalcular(origen) {
        const meta = parseFloat(document.getElementById('meta').value) || 0;
        const freq = parseInt(document.getElementById('freq').value);
        const mMax = document.getElementById('mMax');
        const fFin = document.getElementById('fTermino');

        if (origen === 'monto') {
            const capacidad = parseFloat(mMax.value) || 10;
            const periodos = Math.ceil(meta / ((10 + capacidad) / 2));
            let d = new Date();
            d.setDate(d.getDate() + (periodos * freq));
            fFin.valueAsDate = d;
        } else {
            const dias = Math.ceil((new Date(fFin.value) - new Date()) / 86400000);
            if (dias > 0) {
                const p = Math.max(1, Math.floor(dias / freq));
                mMax.value = Math.ceil((meta / p) * 1.4);
            }
        }
        actualizarInfo(meta, freq);
    }

    function actualizarInfo(meta, freq) {
        const fFin = new Date(document.getElementById('fTermino').value);
        const tasa = parseFloat(document.getElementById('tasa').value) / 100;
        const periodos = Math.ceil(meta / ((10 + parseFloat(document.getElementById('mMax').value)) / 2));
        
        // Interés compuesto proyectado
        const r_n = tasa / (365 / freq);
        const totalProy = (meta / periodos) * ((Math.pow(1 + r_n, periodos) - 1) / r_n);

        document.getElementById('proyTxt').innerHTML = `
            <b>Proyección:</b> ${periodos} depósitos. Término el <b>${fFin.toLocaleDateString()}</b>. 
            Final estimado con intereses: <b style="color:var(--accent)">$${Math.round(totalProy).toLocaleString()}</b>
        `;
    }

    function toggleSetup() {
        const form = document.getElementById('setupForm');
        form.style.display = (form.style.display === 'none') ? 'grid' : 'none';
    }

    function generar() {
        if(db && !confirm("¿Generar un nuevo plan? Se perderán las marcas actuales.")) return;

        const meta = parseFloat(document.getElementById('meta').value);
        const max = parseFloat(document.getElementById('mMax').value);
        const freq = parseInt(document.getElementById('freq').value);
        const fFin = new Date(document.getElementById('fTermino').value);
        const dias = Math.ceil((fFin - new Date()) / 86400000);
        const n = Math.max(1, Math.floor(dias / freq));

        let casillas = [], acum = 0;
        for (let i = 0; i < n; i++) {
            let resto = n - i;
            let mMaxAct = Math.min(max, (meta - acum) - (resto - 1) * 10);
            let m = (resto === 1) ? Math.round(meta - acum) : Math.floor(Math.random() * (mMaxAct - 10 + 1)) + 10;
            if(m > 0) { casillas.push({ m, c: false }); acum += m; }
        }

        db = { meta, casillas, freq, tasa: document.getElementById('tasa').value };
        localStorage.setItem('saveApp_vFinal', JSON.stringify(db));
        render();
    }

    function render() {
        if (!db) return;
        document.getElementById('setupForm').style.display = 'none';
        document.getElementById('appArea').style.display = 'block';
        document.getElementById('btnEdit').style.display = 'block';
        const g = document.getElementById('grid'); g.innerHTML = '';
        let suma = 0;

        db.casillas.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = `cell ${item.c ? 'checked' : ''}`;
            d.innerHTML = `<span class="cell-num">#${i+1}</span><span class="cell-amt">$${item.m}</span>`;
            d.onclick = () => { 
                db.casillas[i].c = !db.casillas[i].c; 
                localStorage.setItem('saveApp_vFinal', JSON.stringify(db)); 
                render(); 
            };
            g.appendChild(d);
            if (item.c) suma += item.m;
        });

        document.getElementById('valAhorro').innerText = `$${suma.toLocaleString()}`;
        document.getElementById('bar').style.width = (suma/db.meta)*100 + '%';
        
        // Interés compuesto alcanzado
        const r_n = (parseFloat(db.tasa)/100) / (365/db.freq);
        const nCheck = db.casillas.filter(c => c.c).length;
        const vCetes = (suma/(nCheck||1)) * ((Math.pow(1+r_n, nCheck)-1)/r_n);
        document.getElementById('valCetes').innerText = `$${Math.round(vCetes || 0).toLocaleString()}`;
    }

    function reset() { if(confirm("¿Borrar todo el historial?")) { localStorage.removeItem('saveApp_vFinal'); location.reload(); } }

    window.onload = () => { 
        document.getElementById('fTermino').valueAsDate = new Date(new Date().setDate(new Date().getDate() + 365));
        recalcular('monto');
        if(db) {
            document.getElementById('meta').value = db.meta;
            document.getElementById('tasa').value = db.tasa;
            document.getElementById('freq').value = db.freq;
            render(); 
        }
    };
</script>
</body>
</html>
